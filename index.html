<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血压记录</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
            background: #f0f2f5;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:disabled { 
            background: #ccc; 
            cursor: not-allowed;
            opacity: 0.6;
        }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-dictate {
            background: #9b59b6;
            color: white;
            width: 60px;
            height: 60px;
            font-size: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            min-height: 60px;
        }
        .btn-dictate:disabled {
            background: #95a5a6;
        }
        .btn-dictate.listening {
            background: #27ae60;
            animation: pulse 1.5s infinite;
        }
        .btn-transfer { 
            background: #3498db; 
            color: white;
            width: 60px;
            height: 60px;
            font-size: 24px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-transfer:disabled {
            background: #95a5a6;
        }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger { background: #95a5a6; color: white; }
        .btn-small { padding: 6px 12px; font-size: 14px; }
        
        .editable-num {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .editable-num.wheel-mode {
            background: #fff3cd;
        }
        .editable-num.input-mode {
            background: #f8f9fa;
        }
        .editable-num.input-mode input {
            width: 50px;
            font-size: 16px;
            text-align: center;
            border: none;
            outline: none;
        }
        
        .btn-start.listening {
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* 识别区布局 */
        .recognition-area {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        .recognition-input {
            flex: 1;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
            background: #fafafa;
        }
        .transfer-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }
        
        .status {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 8px;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #cce5ff; color: #004085; }
        
        .extracted-preview {
            margin-top: 8px;
            padding: 8px 12px;
            background: #e3f2fd;
            border-radius: 6px;
            font-size: 14px;
            color: #1565c0;
        }
        
        .pending-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .pending-item .numbers {
            font-size: 22px;
            font-weight: bold;
            font-family: monospace;
            color: #27ae60;
        }
        .pending-item .actions {
            display: flex;
            gap: 8px;
        }
        
        .record-item {
            padding: 12px;
            background: #e8f5e9;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 4px solid #27ae60;
            font-family: monospace;
            font-size: 16px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .empty-msg {
            text-align: center;
            color: #999;
            padding: 20px;
        }
        
        .browser-tip {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .browser-tip.success { background: #d4edda; color: #155724; }
        .browser-tip.warning { background: #fff3cd; color: #856404; }
        .browser-tip.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div style="text-align:center;color:#999;font-size:12px;margin-bottom:8px;">v0.2-2603140035</div>

<!-- 识别区 -->
<div class="card">
    <h2>📝 识别区（输入区）</h2>
    <div id="status" class="status info">支持直接输入和<span id="currentMethod">前端听写</span></div>
    <div id="extractedPreview" class="extracted-preview" style="display:none;"></div>
    <div class="recognition-area">
        <textarea id="resultText" class="recognition-input" placeholder="可以手工输入血压数据，或点击右侧识别按钮..." oninput="checkAndShowExtracted()"></textarea>
        <div class="transfer-section" style="gap: 10px;">
            <button id="dictateBtn" class="btn btn-dictate">识别</button>
            <button id="addBtn" class="btn btn-transfer" disabled>提取</button>
        </div>
    </div>
    <!-- 识别配置区 -->
    <div id="recognitionConfig" style="display:none; margin-top:12px; padding:12px; background:#f5f5f5; border-radius:8px;">
        <div style="font-weight:bold; margin-bottom:8px;">识别方式配置</div>
        <label style="display:block; margin:8px 0;"><input type="radio" name="recognitionMethod" value="browser" checked> 前端听写</label>
        <label style="display:block; margin:8px 0; color:#999;"><input type="radio" name="recognitionMethod" value="cloud" disabled> 云端听写(预留)</label>
        <label style="display:block; margin:8px 0; color:#999;"><input type="radio" name="recognitionMethod" value="bluetooth" disabled> 蓝牙识别(预留)</label>
        <label style="display:block; margin:8px 0; color:#999;"><input type="radio" name="recognitionMethod" value="camera" disabled> 拍照识别(预留)</label>
        <button class="btn btn-primary" onclick="saveRecognitionConfig()" style="margin-top:8px; width:100%;">保存</button>
    </div>
    <!-- 提取配置区 -->
    <div id="extractionConfig" style="display:none; margin-top:12px; padding:12px; background:#f5f5f5; border-radius:8px;">
        <div style="font-weight:bold; margin-bottom:8px;">提取方式配置</div>
        <label style="display:block; margin:8px 0;"><input type="radio" name="extractionMethod" value="regex" checked onchange="toggleExtractionConfig()"> 正则</label>
        <label style="display:block; margin:8px 0; color:#999;"><input type="radio" name="extractionMethod" value="model" disabled onchange="toggleExtractionConfig()"> 模型(预留)</label>
        <div id="regexConfig" style="margin-top:8px;">
            <input type="text" id="regexHigh" value="高压|收缩压" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom:4px;" placeholder="高压关键词">
            <input type="text" id="regexLow" value="低压|舒张压" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom:4px;" placeholder="低压关键词">
            <input type="text" id="regexPulse" value="心率|脉率|脉搏|心跳" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;" placeholder="心率关键词">
        </div>
        <div id="modelConfig" style="display:none; margin-top:8px;">
            <input type="text" id="modelUrl" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom:4px;" placeholder="模型URL">
            <input type="text" id="modelToken" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; margin-bottom:4px;" placeholder="Token(可选)">
            <textarea id="modelPrompt" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px; min-height:60px;" placeholder="提示词"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveExtractionConfig()" style="margin-top:8px; width:100%;">保存</button>
    </div>
</div>

<!-- 待选区 -->
<div class="card">
    <h2>📋 待选区（数字提取结果）</h2>
    <div id="pendingList">
        <div class="empty-msg">暂无数据</div>
    </div>
    <div style="margin-top:12px;">
        <button id="recordBtn" class="btn btn-primary" style="display:none; width:100%;">✅ 采纳</button>
    </div>
</div>

<!-- 记录区 -->
<div class="card">
    <h2 id="recordTitle">📚 记录区（格式化结果）</h2>
    <div id="recordList">
        <div class="empty-msg">暂无记录</div>
    </div>
    <!-- 记录格式配置区 -->
    <div id="recordConfig" style="display:none; margin-top:12px; padding:12px; background:#f5f5f5; border-radius:8px;">
        <div style="font-weight:bold; margin-bottom:8px;">记录格式配置</div>
        <input type="text" id="recordFormat" value="HH:MM---high/low(diff)-pulse🩺" style="width:100%; padding:8px; border:1px solid #ddd; border-radius:4px;">
        <div style="font-size:12px; color:#666; margin-top:4px;">可用变量: HH(时) MM(分) high(高压) low(低压) diff(压差) pulse(心率)</div>
        <button class="btn btn-primary" onclick="saveRecordConfig()" style="margin-top:8px; width:100%;">保存</button>
    </div>
</div>

<script>
// ========== 配置模块 ==========
const config = {
    recognition: {
        current: localStorage.getItem('recognitionCurrent') || 'browser',
        methods: {
            browser: { name: '前端听写' },
            cloud: { name: '云端听写', url: '', token: '' },
            bluetooth: { name: '蓝牙识别', device: '' },
            camera: { name: '拍照识别' }
        }
    },
    extraction: {
        current: localStorage.getItem('extractionCurrent') || 'regex',
        regex: {
            high: JSON.parse(localStorage.getItem('regexHigh')) || ['高压', '收缩压'],
            low: JSON.parse(localStorage.getItem('regexLow')) || ['低压', '舒张压'],
            pulse: JSON.parse(localStorage.getItem('regexPulse')) || ['心率', '脉率', '脉搏', '心跳']
        },
        model: {
            url: localStorage.getItem('modelUrl') || '',
            token: localStorage.getItem('modelToken') || '',
            prompt: localStorage.getItem('modelPrompt') || ''
        }
    },
    record: {
        format: localStorage.getItem('recordFormat') || 'HH:MM---high/low(diff)-pulse🩺'
    }
};

// 更新当前方式显示
function updateCurrentMethod() {
    const method = config.recognition.methods[config.recognition.current];
    document.getElementById('currentMethod').textContent = method.name;
}

// 保存识别配置
function saveRecognitionConfig() {
    const selected = document.querySelector('input[name="recognitionMethod"]:checked').value;
    config.recognition.current = selected;
    localStorage.setItem('recognitionCurrent', selected);
    updateCurrentMethod();
    document.getElementById('recognitionConfig').style.display = 'none';
}

// 切换提取配置显示
function toggleExtractionConfig() {
    const method = document.querySelector('input[name="extractionMethod"]:checked').value;
    document.getElementById('regexConfig').style.display = method === 'regex' ? 'block' : 'none';
    document.getElementById('modelConfig').style.display = method === 'model' ? 'block' : 'none';
}

// 初始化提取配置
function initExtractionConfig() {
    document.getElementById('regexHigh').value = config.extraction.regex.high.join('|');
    document.getElementById('regexLow').value = config.extraction.regex.low.join('|');
    document.getElementById('regexPulse').value = config.extraction.regex.pulse.join('|');
    document.getElementById('modelUrl').value = config.extraction.model.url;
    document.getElementById('modelToken').value = config.extraction.model.token;
    document.getElementById('modelPrompt').value = config.extraction.model.prompt;
}

// 保存提取配置
function saveExtractionConfig() {
    const method = document.querySelector('input[name="extractionMethod"]:checked').value;
    config.extraction.current = method;
    localStorage.setItem('extractionCurrent', method);
    
    config.extraction.regex.high = document.getElementById('regexHigh').value.split('|');
    config.extraction.regex.low = document.getElementById('regexLow').value.split('|');
    config.extraction.regex.pulse = document.getElementById('regexPulse').value.split('|');
    localStorage.setItem('regexHigh', JSON.stringify(config.extraction.regex.high));
    localStorage.setItem('regexLow', JSON.stringify(config.extraction.regex.low));
    localStorage.setItem('regexPulse', JSON.stringify(config.extraction.regex.pulse));
    
    config.extraction.model.url = document.getElementById('modelUrl').value;
    config.extraction.model.token = document.getElementById('modelToken').value;
    config.extraction.model.prompt = document.getElementById('modelPrompt').value;
    localStorage.setItem('modelUrl', config.extraction.model.url);
    localStorage.setItem('modelToken', config.extraction.model.token);
    localStorage.setItem('modelPrompt', config.extraction.model.prompt);
    
    document.getElementById('extractionConfig').style.display = 'none';
}

// 保存记录配置
function saveRecordConfig() {
    config.record.format = document.getElementById('recordFormat').value;
    localStorage.setItem('recordFormat', config.record.format);
    document.getElementById('recordConfig').style.display = 'none';
    renderRecords();
}

// 长按检测
let dictateBtnTimer = null;
let addBtnTimer = null;
let recordTitleTimer = null;

document.addEventListener('DOMContentLoaded', function() {
    // 识别按钮长按
    dictateBtn.addEventListener('touchstart', function() {
        dictateBtnTimer = setTimeout(() => {
            document.getElementById('recognitionConfig').style.display = 'block';
        }, 800);
    });
    dictateBtn.addEventListener('touchend', function() {
        if (dictateBtnTimer) clearTimeout(dictateBtnTimer);
    });
    dictateBtn.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        document.getElementById('recognitionConfig').style.display = 'block';
    });
    
    // 提取按钮长按
    addBtn.addEventListener('touchstart', function() {
        addBtnTimer = setTimeout(() => {
            document.getElementById('extractionConfig').style.display = 'block';
            initExtractionConfig();
        }, 800);
    });
    addBtn.addEventListener('touchend', function() {
        if (addBtnTimer) clearTimeout(addBtnTimer);
    });
    addBtn.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        document.getElementById('extractionConfig').style.display = 'block';
        initExtractionConfig();
    });
    
    // 记录区标题长按
    document.getElementById('recordTitle').addEventListener('touchstart', function() {
        recordTitleTimer = setTimeout(() => {
            document.getElementById('recordConfig').style.display = 'block';
            document.getElementById('recordFormat').value = config.record.format;
        }, 800);
    });
    document.getElementById('recordTitle').addEventListener('touchend', function() {
        if (recordTitleTimer) clearTimeout(recordTitleTimer);
    });
    document.getElementById('recordTitle').addEventListener('contextmenu', function(e) {
        e.preventDefault();
        document.getElementById('recordConfig').style.display = 'block';
        document.getElementById('recordFormat').value = config.record.format;
    });
});

// 初始化
updateCurrentMethod();

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const dictateBtn = document.getElementById('dictateBtn');
const statusDiv = document.getElementById('status');
const resultText = document.getElementById('resultText');
const extractedPreview = document.getElementById('extractedPreview');
const addBtn = document.getElementById('addBtn');
const pendingList = document.getElementById('pendingList');
const recordBtn = document.getElementById('recordBtn');
const recordList = document.getElementById('recordList');

let recognition = null;
let isListening = false;
let finalTranscript = '';
let pendingData = [];
let recordData = [];

if (!SpeechRecognition) {
    statusDiv.textContent = '❌ 当前浏览器不支持听写';
    statusDiv.className = 'status error';
    dictateBtn.disabled = true;
} else if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    statusDiv.innerHTML = '⚠️ 需要<b>HTTPS</b>才能使用麦克风，请使用安全连接访问';
    statusDiv.className = 'status error';
    dictateBtn.disabled = true;
} else {
    // 检测浏览器类型
    const ua = navigator.userAgent;
    const isIOS = /iPad|iPhone|iPod/.test(ua);
    const isMac = /Mac/.test(ua) && !isIOS;
    const isWin = /Windows/.test(ua);
    const isAndroid = /Android/.test(ua);
    const isLinux = /Linux/.test(ua) && !isAndroid;
    const isEdge = /Edg/.test(ua);
    const isSafari = /Safari/.test(ua) && !/Chrome/.test(ua);
    const isChrome = /Chrome/.test(ua) && !/Edg/.test(ua);
    
    if (isChrome) {
        const browserTip = document.getElementById('browserTip');
        if (isIOS || isMac) {
            browserTip.innerHTML = '⚠️ 建议使用 <b>Edge</b> 或 <b>Safari</b> 浏览器';
            browserTip.className = 'browser-tip warning';
        } else {
            browserTip.innerHTML = '⚠️ 建议使用 <b>Edge</b> 浏览器';
            browserTip.className = 'browser-tip warning';
        }
    }
    
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.continuous = true;
    recognition.interimResults = true;
    
    dictateBtn.onclick = function() {
        if (isListening) stopListening();
        else startListening();
    };
    
    recognition.onresult = function(event) {
        console.log('onresult called, results:', event.results.length);
        let interim = '';
        let final = '';
        
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            console.log('result', i, 'isFinal:', event.results[i].isFinal, 'transcript:', transcript);
            if (event.results[i].isFinal) final += transcript;
            else interim += transcript;
        }
        
        if (final) finalTranscript += final;
        
        // 显示识别内容（包含中间结果）
        resultText.value = finalTranscript + (interim ? '\n' + interim : '');
        resultText.scrollTop = resultText.scrollHeight;
        
        // 检查并显示提取预览
        checkAndShowExtracted();
    };
    
    recognition.onerror = function(event) {
        console.log('onerror:', event.error);
        let msg = event.error;
        if (msg === 'not-allowed' || msg === 'permission-denied') {
            msg = '麦克风权限被拒绝，请允许浏览器使用麦克风';
        } else if (msg === 'no-speech') {
            msg = '未检测到语音';
        } else if (msg === 'network') {
            msg = '网络错误';
        } else {
            msg = event.error + ' - 尝试使用本地模型';
        }
        statusDiv.textContent = '⚠️ ' + msg;
        statusDiv.className = 'status error';
        dictateBtn.textContent = '识别';
        dictateBtn.className = 'btn btn-dictate';
        isListening = false;
    };
    
    recognition.onend = function() {
        // 自动重启识别
        if (isListening) {
            try { recognition.start(); } catch(e) {}
        } else {
            // 用户主动停止
            // 检查 finalTranscript 是否有内容
            if (finalTranscript) {
                statusDiv.textContent = '✅ 识别结束，识别到: ' + finalTranscript;
            }
            dictateBtn.textContent = '识别';
            dictateBtn.className = 'btn btn-dictate';
            addBtn.disabled = false;
        }
    };
}

function startListening() {
    isListening = true;
    finalTranscript = '';
    resultText.value = '';
    extractedPreview.style.display = 'none';
    addBtn.disabled = true;
    
    dictateBtn.textContent = '停止';
    dictateBtn.className = 'btn btn-dictate listening';
    statusDiv.textContent = '🔴 正在听写...';
    statusDiv.className = 'status info';
    
    try { 
        recognition.start(); 
    } catch(e) {
        statusDiv.textContent = '⚠️ 无法启动识别: ' + e.message;
        statusDiv.className = 'status error';
        isListening = false;
        dictateBtn.textContent = '识别';
    }
}

function stopListening() {
    isListening = false;
    dictateBtn.textContent = '识别';
    dictateBtn.className = 'btn btn-dictate';
    statusDiv.textContent = '✅ 识别结束';
    statusDiv.className = 'status success';
    
    try { recognition.stop(); } catch(e) {}
    
    // 恢复下箭头可用
    addBtn.disabled = false;
}

// 提取三个数字（按位置：第1个=高压，第2个=低压，第3个=心率）
function extractThreeNumbers(text) {
    // 使用可配置的关键词
    const highKeywords = config.extraction.regex.high;
    const lowKeywords = config.extraction.regex.low;
    const pulseKeywords = config.extraction.regex.pulse;
    
    let high = null, low = null, pulse = null;
    
    // 按关键词查找
    for (let kw of highKeywords) {
        const match = text.match(new RegExp(kw + '[^\\d]*(\\d{2,3})'));
        if (match) { high = parseInt(match[1]); break; }
    }
    
    for (let kw of lowKeywords) {
        const match = text.match(new RegExp(kw + '[^\\d]*(\\d{2,3})'));
        if (match) { low = parseInt(match[1]); break; }
    }
    
    for (let kw of pulseKeywords) {
        const match = text.match(new RegExp(kw + '[^\\d]*(\\d{2,3})'));
        if (match) { pulse = parseInt(match[1]); break; }
    }
    
    // 如果有关键词，使用关键词结果
    if (high || low || pulse) {
        return { high, low, pulse, method: 'keyword' };
    }
    
    // 没有关键词，按位置提取（第1个数字=高压，第2个=低压，第3个=心率）
    const allNumbers = text.match(/\d{2,3}/g);
    if (allNumbers && allNumbers.length >= 3) {
        return {
            high: parseInt(allNumbers[0]),
            low: parseInt(allNumbers[1]),
            pulse: parseInt(allNumbers[2]),
            method: 'position'
        };
    }
    
    return { high, low, pulse, method: 'none' };
}

function checkAndShowExtracted() {
    const text = resultText.value;
    const nums = extractThreeNumbers(text);
    
    if (nums.high || nums.low || nums.pulse) {
        extractedPreview.style.display = 'block';
        
        const methodText = nums.method === 'position' ? '(按位置)' : '(按关键词)';
        extractedPreview.innerHTML = `
            <strong>提取结果${methodText}:</strong> 
            高压${nums.high || '-'} / 低压${nums.low || '-'} / 心率${nums.pulse || '-'}
        `;
        addBtn.disabled = false;
    } else {
        extractedPreview.style.display = 'none';
        addBtn.disabled = !text.trim();
    }
}

// 识别区 → 待选区
addBtn.onclick = function() {
    const text = resultText.value;
    if (!text.trim()) return;
    
    // 用本地逻辑提取数字
    const nums = extractThreeNumbers(text);
    
    pendingData.unshift({
        id: Date.now(),
        high: nums.high,
        low: nums.low,
        pulse: nums.pulse,
        originalText: text
    });
    
    renderPending();
    
    finalTranscript = '';
    resultText.value = '';
    extractedPreview.style.display = 'none';
    addBtn.disabled = true;
    statusDiv.textContent = '✅ 已加入待选区';
    statusDiv.className = 'status success';
};

function renderPending() {
    if (pendingData.length === 0) {
        pendingList.innerHTML = '<div class="empty-msg">暂无数据</div>';
        recordBtn.style.display = 'none';
        return;
    }
    
    pendingList.innerHTML = pendingData.map((item, index) => `
        <div class="pending-item">
            <div class="numbers">
                <span class="editable-num" onclick="editNum(${index}, 'high')">${item.high || '-'}</span>/<span class="editable-num" onclick="editNum(${index}, 'low')">${item.low || '-'}</span>/<span class="editable-num" onclick="editNum(${index}, 'pulse')">${item.pulse || '-'}</span>
            </div>
            <div class="actions">
                <button class="btn btn-danger btn-small" onclick="deleteItem(${index})">删除</button>
            </div>
        </div>
    `).join('');
    
    recordBtn.style.display = 'block';
}

let editState = {}; // 记录每个数字的编辑状态 { 'index-field': 'wheel'|'input' }
let currentEditKey = null; // 当前正在编辑的key
let currentIndex = null;
let currentField = null;
let touchStartY = 0;

function clearEdit() {
    if (currentEditKey) {
        document.removeEventListener('wheel', handleWheel);
        document.removeEventListener('touchmove', handleTouch);
        document.removeEventListener('touchstart', handleTouchStart);
    }
    editState = {};
    currentEditKey = null;
    currentIndex = null;
    currentField = null;
}

function editNum(index, field) {
    const key = index + '-' + field;
    const span = event.target;
    const item = pendingData[index];
    
    // 如果点击的是同一个数字，进入下一状态
    if (currentEditKey === key) {
        // 如果在输入态，保存并退出
        if (editState[key] === 'input') {
            const input = span.querySelector('input');
            if (input) {
                const val = parseInt(input.value) || null;
                pendingData[index][field] = val;
            }
            clearEdit();
            renderPending();
            return;
        }
        
        // 如果在滚轮态，进入输入态
        if (editState[key] === 'wheel') {
            editState[key] = 'input';
            const currentValue = item[field] || '';
            span.className = 'editable-num input-mode';
            span.innerHTML = '';
            const input = document.createElement('input');
            input.type = 'number';
            input.value = currentValue;
            span.appendChild(input);
            input.focus();
            input.select();
            
            input.onblur = function() {
                const val = parseInt(input.value) || null;
                pendingData[index][field] = val;
                clearEdit();
                renderPending();
            };
            
            input.onkeydown = function(e) {
                if (e.key === 'Enter') {
                    input.blur();
                }
            };
            return;
        }
    }
    
    // 点击的是不同数字，先清除之前的编辑状态
    clearEdit();
    renderPending();
    
    // 重新获取span（因为刚渲染过）
    const spans = document.querySelectorAll('.editable-num');
    let newSpan = null;
    spans.forEach(s => {
        const onclick = s.getAttribute('onclick');
        if (onclick && onclick.includes(`editNum(${index}`) && onclick.includes(`'${field}'`)) {
            newSpan = s;
        }
    });
    if (!newSpan) return;
    
    // 进入滚轮态
    editState[key] = 'wheel';
    currentEditKey = key;
    currentIndex = index;
    currentField = field;
    newSpan.className = 'editable-num wheel-mode';
    
    // 全局滚轮调整
    document.addEventListener('wheel', handleWheel = function(e) {
        if (currentEditKey !== key) return;
        e.preventDefault();
        let val = pendingData[index][field] || 0;
        if (e.deltaY < 0) val++;
        else val--;
        if (val < 0) val = 0;
        if (val > 300) val = 300;
        pendingData[index][field] = val;
        newSpan.textContent = val;
    }, { passive: false });
    
    // 全局触摸调整
    document.addEventListener('touchstart', handleTouchStart = function(e) {
        touchStartY = e.touches[0].clientY;
    });
    
    document.addEventListener('touchmove', handleTouch = function(e) {
        if (currentEditKey !== key) return;
        e.preventDefault();
        const touchY = e.touches[0].clientY;
        const diff = touchStartY - touchY;
        if (Math.abs(diff) > 10) {
            let val = pendingData[index][field] || 0;
            if (diff > 0) val++;
            else val--;
            if (val < 0) val = 0;
            if (val > 300) val = 300;
            pendingData[index][field] = val;
            newSpan.textContent = val;
            touchStartY = touchY;
        }
    }, { passive: false });
}

function handleWheel(e) {}
function handleTouch(e) {}
function handleTouchStart(e) {}

function deleteItem(index) {
    pendingData.splice(index, 1);
    renderPending();
}

// 采纳（单条=格式化，多条=平均+格式化）
recordBtn.onclick = function() {
    if (pendingData.length === 0) return;
    
    const now = new Date();
    const time = now.toLocaleTimeString('zh-CN', {hour12: false}).substring(0, 5);
    
    // 保存原始数据用于核对
    const sources = pendingData.map(item => ({
        high: item.high,
        low: item.low,
        pulse: item.pulse
    }));
    
    let result;
    
    if (pendingData.length === 1) {
        // 单条：格式化
        const item = pendingData[0];
        const diff = (item.high && item.low) ? item.high - item.low : null;
        result = {
            time: time,
            high: item.high,
            low: item.low,
            diff: diff,
            pulse: item.pulse,
            count: 1,
            sources: sources  // 保留原始数据
        };
    } else {
        // 多条：计算平均
        const validHigh = pendingData.filter(d => d.high).map(d => d.high);
        const validLow = pendingData.filter(d => d.low).map(d => d.low);
        const validPulse = pendingData.filter(d => d.pulse).map(d => d.pulse);
        
        const avgHigh = validHigh.length ? Math.round(validHigh.reduce((a,b) => a+b, 0) / validHigh.length) : null;
        const avgLow = validLow.length ? Math.round(validLow.reduce((a,b) => a+b, 0) / validLow.length) : null;
        const avgPulse = validPulse.length ? Math.round(validPulse.reduce((a,b) => a+b, 0) / validPulse.length) : null;
        const diff = (avgHigh && avgLow) ? avgHigh - avgLow : null;
        
        result = {
            time: time,
            high: avgHigh,
            low: avgLow,
            diff: diff,
            pulse: avgPulse,
            count: pendingData.length,
            sources: sources  // 保留原始数据
        };
    }
    
    recordData.unshift(result);
    renderRecords();
    
    // 待选区显示"已采纳"状态，不立即清空
    pendingList.innerHTML = '<div class="status success" style="padding:20px;text-align:center;">✅ 已采纳到记录区</div>';
    recordBtn.style.display = 'none';
    
    // 延迟清空待选区
    setTimeout(() => {
        pendingData = [];
        renderPending();
    }, 3000);
    
    statusDiv.textContent = '✅ 已采纳并记录';
    statusDiv.className = 'status success';
};

function renderRecords() {
    if (recordData.length === 0) {
        recordList.innerHTML = '<div class="empty-msg">暂无记录</div>';
        return;
    }
    
    recordList.innerHTML = recordData.map((item, index) => {
        // 使用可配置的格式化字符串
        const time = item.time.split(':');
        const text = config.record.format
            .replace('HH', time[0])
            .replace('MM', time[1])
            .replace('high', item.high)
            .replace('low', item.low)
            .replace('diff', item.diff)
            .replace('pulse', item.pulse);
        const sources = item.sources ? `（来源：${item.sources.map(s => `${s.high}/${s.low}/${s.pulse}`).join('、')}）` : '';
        return `<div class="record-item">
            <div>
                <span>${text}</span>
            </div>
            <button class="btn btn-small btn-warning" onclick="copyRecord('${text}', ${index})">复制</button>
        </div>
        ${sources ? `<div style="color:#666;font-size:12px;padding:4px 0 8px 0;border-bottom:1px solid #eee;">${sources}</div>` : ''}`;
    }).join('');
}

function copyRecord(text, index) {
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelectorAll('.record-item .btn')[index];
        const originalText = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => {
            btn.textContent = originalText;
        }, 1500);
    });
}

// 初始化
renderPending();
renderRecords();
</script>
